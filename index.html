<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chúc Mừng Khai Trương</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Be Vietnam Pro', sans-serif;
            background: linear-gradient(135deg, #ff0000, #ff9900);
            color: white;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            animation: fadeIn 2s ease-in-out;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }

        h2 {
            font-size: 28px;
            margin-bottom: 30px;
        }

        .firework {
            font-size: 60px;
            animation: bounce 1.5s infinite;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .footer {
            position: absolute;
            bottom: 20px;
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="firework">🎆🎉</div>
    <h1>CHÚC MỪNG CÔNG TY LONG PHƯƠNG KHAI TRƯƠNG</h1>
    <h2>HỒNG PHÁT – PHÁT TÀI – THÀNH CÔNG RỰC RỠ</h2>
    <p>Kính chúc Quý Công Ty ngày càng phát triển bền vững và thịnh vượng!</p>
</div>

<div class="footer">
    Trân trọng gửi lời chúc tốt đẹp nhất 💐
</div>

</body>

</html>
